name: Publish Zephyr app images

on:
  push:
    branches:
      - main
    paths:
      - zephyr-application/**
      - "!zephyr-application/Dockerfile.workspace"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        platform: [stm32mp257, imx93]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: zephyr-application/
          push: true
          platforms: linux/arm64
          build-args: |
            PLATFORM=${{ matrix.platform }}
            BUILDKIT_INLINE_CACHE=1
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/zephyr-${{ matrix.platform }}:latest
          cache-to: type=inline
          tags: |
            ghcr.io/${{ github.repository }}/zephyr-${{ matrix.platform }}:latest
            ghcr.io/${{ github.repository }}/zephyr-${{ matrix.platform }}:${{ github.sha }}
