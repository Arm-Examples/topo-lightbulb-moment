name: Publish Zephyr app images

on:
  push:
    branches:
      - main
    paths:
      - zephyr-application/**
      - "!zephyr-application/Dockerfile.workspace"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - board: stm32mp257
            runner: ubuntu-latest
            platform: linux/arm64
            suffix: amd64-for-arm64
          - board: stm32mp257
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
          - board: imx93
            runner: ubuntu-latest
            platform: linux/arm64
            suffix: amd64-for-arm64
          - board: imx93
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.board }}, ${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: zephyr-application/
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            PLATFORM=${{ matrix.board }}
            BUILDKIT_INLINE_CACHE=1
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.REPO }}/zephyr-${{ matrix.board }}:buildcache-${{ matrix.suffix }}
            type=registry,ref=ghcr.io/${{ env.REPO }}/zephyr-${{ matrix.board }}:latest-${{ matrix.suffix }}
          cache-to: |
            type=registry,ref=ghcr.io/${{ env.REPO }}/zephyr-${{ matrix.board }}:buildcache-${{ matrix.suffix }},mode=max
            type=inline
          tags: ghcr.io/${{ env.REPO }}/zephyr-${{ matrix.board }}:latest-${{ matrix.suffix }}

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        board: [stm32mp257, imx93]

    steps:
      - name: Set repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-platform manifest (${{ matrix.board }})
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.REPO }}/zephyr-${{ matrix.board }}:latest \
            --tag ghcr.io/${{ env.REPO }}/zephyr-${{ matrix.board }}:${{ github.sha }} \
            ghcr.io/${{ env.REPO }}/zephyr-${{ matrix.board }}:latest-arm64
