name: Publish Zephyr workspace image

on:
  push:
    branches:
      - main
    paths:
      - zephyr-application/Dockerfile.workspace
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: zephyr-application/
          file: zephyr-application/Dockerfile.workspace
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ env.REPO }}/zephyr-workspace:sdk-v0.28.0-zephyr-v4.3.0-${{ matrix.suffix }}

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.REPO }}/zephyr-workspace:sdk-v0.28.0-zephyr-v4.3.0 \
            --tag ghcr.io/${{ env.REPO }}/zephyr-workspace:latest \
            ghcr.io/${{ env.REPO }}/zephyr-workspace:sdk-v0.28.0-zephyr-v4.3.0-amd64 \
            ghcr.io/${{ env.REPO }}/zephyr-workspace:sdk-v0.28.0-zephyr-v4.3.0-arm64
