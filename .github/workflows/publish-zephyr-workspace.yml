name: Publish Zephyr workspace image

on:
  push:
    branches:
      - main
    paths:
      - zephyr-application/Dockerfile.workspace
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push workspace image
        uses: docker/build-push-action@v6
        with:
          context: zephyr-application/
          file: zephyr-application/Dockerfile.workspace
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ env.REPO }}/zephyr-workspace:sdk-v0.28.0-zephyr-v4.3.0
            ghcr.io/${{ env.REPO }}/zephyr-workspace:latest
