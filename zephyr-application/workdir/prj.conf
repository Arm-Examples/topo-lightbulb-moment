# Disable SOC reset hook (Linux manages hardware initialization)
CONFIG_SOC_RESET_HOOK=n

# Enable basic console / UART output
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y        # Route console to the chosen UART
CONFIG_CONSOLE=y             # Generic console support (usually selected automatically)
CONFIG_PRINTK=y              # Allow printk()  (handy for debug)
CONFIG_STDOUT_CONSOLE=y      # Route C-library printf/puts to the console

# LED and GPIO support (kept from original config)
CONFIG_LED=y
CONFIG_LED_GPIO=y
CONFIG_GPIO=y

# Enable Clock Control - clock already enabled by Linux, driver just reads status
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_STM32_CUBE=y

# Enable IPM (Inter-Processor Messaging) - required for IPCC mailbox
CONFIG_IPM=y
CONFIG_IPM_STM32_IPCC=y
# PROCID 2 = Cortex-M33 (use C2 register set)
# PROCID 1 = Cortex-A35 (use C1 register set)
CONFIG_IPM_STM32_IPCC_PROCID=2

# Enable OpenAMP with resource table (for Linux remoteproc)
CONFIG_OPENAMP=y
CONFIG_OPENAMP_RSC_TABLE=y
CONFIG_OPENAMP_RSC_TABLE_NUM_RPMSG_BUFF=8
# Enable cache operations for shared memory coherency
CONFIG_DCACHE=y

# Enable master mode for name service announcements
CONFIG_OPENAMP_MASTER=y

# Memory pool size for RPMsg operations
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Enable logging for IPM and drivers
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
# Keep IPM at info level, disable kernel debug spam
CONFIG_IPM_LOG_LEVEL_INF=y
