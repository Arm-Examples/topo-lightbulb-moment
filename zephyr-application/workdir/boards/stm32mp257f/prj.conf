CONFIG_SOC_RESET_HOOK=n

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y

CONFIG_LED=y
CONFIG_LED_GPIO=y
CONFIG_GPIO=y

CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_STM32_CUBE=y

CONFIG_IPM=y
CONFIG_IPM_STM32_IPCC=y
CONFIG_IPM_STM32_IPCC_PROCID=2

# Enable OpenAMP with resource table (for Linux remoteproc)
CONFIG_OPENAMP=y
CONFIG_OPENAMP_RSC_TABLE=y
CONFIG_OPENAMP_RSC_TABLE_NUM_RPMSG_BUFF=8
# Enable cache operations for shared memory coherency
CONFIG_DCACHE=y

# Enable master mode for name service announcements
CONFIG_OPENAMP_MASTER=y

CONFIG_HEAP_MEM_POOL_SIZE=8192

# Enable logging for IPM and drivers
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_IPM_LOG_LEVEL_INF=y
